name: Lume
options:
  bundleIdPrefix: com.lume
  developmentLanguage: fr
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "2.2"
    CURRENT_PROJECT_VERSION: "24"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    SWIFT_VERSION: "5.0"

targets:
  Lume:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lume.musicplayer
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Sources/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  LumeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Lume
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lume.musicplayer.tests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  Lume:
    build:
      targets:
        Lume: all
        LumeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LumeTests
    archive:
      config: Release
