name: Build IPA

# Se lance manuellement (onglet Actions -> Run workflow) ou a chaque push sur main
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  # Tests unitaires (parsing artistes, metadonnees, LRC, doublons).
  # Job SEPARE et non bloquant : si un test echoue tu le vois dans Actions,
  # mais l'IPA se construit quand meme (les simulateurs CI sont parfois capricieux).
  test:
    runs-on: macos-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer XcodeGen
        run: brew install xcodegen

      - name: Generer le projet Xcode
        run: xcodegen generate

      - name: Lancer les tests unitaires
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE "iPhone [0-9][^(]*" | head -1 | sed 's/ *$//')
          echo "Simulateur choisi : $DEVICE"
          xcodebuild test \
            -project Lume.xcodeproj \
            -scheme Lume \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  build:
    runs-on: macos-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer XcodeGen
        run: brew install xcodegen

      - name: Generer le projet Xcode
        run: xcodegen generate

      - name: Compiler (sans signature)
        run: |
          xcodebuild \
            -project Lume.xcodeproj \
            -scheme Lume \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            clean build

      - name: Empaqueter en .ipa non signe
        run: |
          cd build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -R Lume.app Payload/
          zip -r Lume-unsigned.ipa Payload >/dev/null
          mkdir -p "$GITHUB_WORKSPACE/output"
          mv Lume-unsigned.ipa "$GITHUB_WORKSPACE/output/"

      - name: Publier le .ipa en artefact telechargeable
        uses: actions/upload-artifact@v4
        with:
          name: Lume-unsigned-ipa
          path: output/Lume-unsigned.ipa
          if-no-files-found: error
